# NeoForge mod metadata — generated at build time, do not edit directly
# Edit src/main/templates/META-INF/neoforge.mods.toml instead

modLoader = "javafml"
loaderVersion = "${loader_version_range}"

license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
logoFile = ""

description = "${mod_description}"

[[dependencies.${mod_id}]]
    modId = "neoforge"
    type = "required"
    versionRange = "${neo_version_range}"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "minecraft"
    type = "required"
    versionRange = "${minecraft_version_range}"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "core_lib"
    type = "required"
    versionRange = "[1.0.0,2.0.0)"
    ordering = "BEFORE"
    side = "BOTH"
